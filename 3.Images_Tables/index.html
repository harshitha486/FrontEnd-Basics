<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images&Tables</title>
    <link rel="stylesheet" href="stylec.css">
</head>
<body>
    <h1>Image</h1>
    <img width="280" src="nature.png" alt="my image">

    <h1>Table</h1>
    <table border="1">
        <caption>Student Details</caption>
        <thead>
            <tr>
                <th>Name</th>
                <th>ID</th>
                <th>Branch</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Harshitha</td>
                <td>1</td>
                <td>CSE</td>
            </tr>
            <tr>
                <td colspan="2">Bunny</td>
                <td rowspan="2">EEE</td>
            </tr>
            <tr>
                <td colspan="2">Bharath</td>
    

            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3"> End of the table</td>

            </tr>
        </tfoot>
    </table>
    
</body>
</html>
