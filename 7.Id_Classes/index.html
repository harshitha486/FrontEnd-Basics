<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Id & Classes</title>
    <style>
        .red{
            color: red;
        }
        .yellow{
            background-color: yellowgreen;
        }
        #second{
            background-color: #e4c1c1;
        }
    </style>
</head>
<body>
    <div  class="red yellow" id="first">First</div>
    <div  class="red" id="second">Second</div>
</body>
</html>
