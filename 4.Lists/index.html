<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    <h1>Unordered Lists</h1>
    <ul type="square">
        <li>Apple</li>
        <li>Banana</li>
        <li>Mango</li>
    </ul>
    <h1>Ordered Lists</h1>
    <ol type="A">
        <li>Apple</li>
        <li>Banana</li>
        <li>Mango</li>
    </ol>

    <h1>Definition Lists</h1>
    <dl>
        <dt>HTML</dt>
        <dd>HyperText Markup Language</dd>

        <dt>JS</dt>
        <dd>JavaScript</dd>
    </dl>
</body>
</html>
