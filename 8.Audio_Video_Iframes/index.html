<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio, Video & Iframes</title>
</head>
<body>
    <audio src="Jack Sparrow.mp3" controls></audio>
    <!-- <audio src="Jack Sparrow.mp3" controls autoplay muted loop></audio> -->

    <video width="500" height="500" src="RadhaKrishna.mp4" controls poster="nature.png"></video>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/XZwBNDGuWGU?si=ZhCQ0BQFPHTINYAz" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <svg height="100" width="100">
        <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="red" />
    </svg>

    <!-- <iframe src="https://www.codewithharry.com/tutorial/html-iframes/" width="322" height="444"></iframe> -->

</body>
</html>
