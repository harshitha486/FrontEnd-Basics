<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position Propery</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            border: 2px solid black;
            width: 80vw;
            height: 400px;
            margin: 3px;
        }
        .box1{
            background-color: aqua;
            /* position: relative;
            margin: 0;
            top: 20px;
            left: 30px;
            z-index: 1; */
            /* position: absolute;
            top: 10px; */
            position: sticky;
            top: 2px;
            height: 100px;
        }
        .box2{
            background-color: azure;
            /* position: relative; */
            /* z-index: 1; */
        }
        .box3{
            background-color:antiquewhite;
        }
        .box4{
            background-color: purple;
            position: fixed;
            left: 50px;
            bottom: 2px;
            height: 100px;

        }
        .parent{
            border: 2px solid purple;
            margin: 43px;
            padding: 32px;
            position: relative;
            /* Exception: transform, filter, or perspective properties can also make an element appear as positioned */
            /* transform: translate(0); */
            /* filter: invert(0); */
            /* perspective: 0em; */
        }

        
    </style>
</head>
<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
</body>
</html>
