<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Queries</title>
    <style>
        body{
            background-color: rgb(211, 141, 29);
        }
        .boxes{
            display: flex;
        }
        .box{
            background-color: #881717;
            border: 2px solid black;
            width: 300px;
            height: 200px;
        }
        @media only screen and (max-width: 455px){
            body{

                background-color: blue;
            }
            
            .boxes{
                flex-direction: column;
            }
        }

        /* @media not|only mediatype and (expressions) {
            CSS-Code;
        } */
         
    </style>
</head>
<body>

    <div class="boxes">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>
</html>
