<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box1{
            margin: 20px;
            padding: 20px;
            height: 100px;
            background-color: #af9a9a;
            border: 2px solid rgb(8, 107, 66);
            box-sizing: border-box;
        }
        .box2{
            margin: 40px;
            /* margin collapses and overall margin becomes 40px */
            padding: 20px; 
            height: 100px;
            background-color: #af9a9a;
            border: 2px solid rgb(8, 107, 66);
        }

    </style>
</head>
<body>
    <div class="box">
        <div class="box1">This is first box</div>
        <div class="box2">This is Second box</div>
    </div>
</body>
</html>
